<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NSSA · About Creator 편집기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f0f0;color:#222;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── 헤더 ── */
.app-header{background:#111;color:#fff;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.app-header .logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em}
.app-header .sep{width:1px;height:18px;background:#555}
.app-header .sub{font-size:12px;color:#aaa;letter-spacing:.04em}

/* ── 메인 ── */
.main{display:flex;flex:1;overflow:hidden}
.form-panel{width:420px;flex-shrink:0;overflow-y:auto;padding:20px 22px 30px;border-right:1px solid #ddd;background:#fafafa}
.preview-panel{flex:1;overflow-y:auto;padding:20px;display:flex;justify-content:center;align-items:flex-start;background:#e0e0e0}
.preview-inner{width:100%;max-width:520px}

/* ── 폼 공통 ── */
.sec{margin-bottom:18px}
.sec-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:12px;background:#111;border-radius:2px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#666;margin-bottom:4px;font-weight:500}
.field input[type=text],.field textarea{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit;background:#fff;transition:border .15s}
.field input[type=text]:focus,.field textarea:focus{outline:none;border-color:#111}
.field textarea{resize:vertical;min-height:48px}

/* ── 리치에딧 ── */
.rich-wrap{border:1px solid #ccc;border-radius:6px;overflow:hidden;background:#fff}
.rich-edit{min-height:52px;padding:8px 10px;font-size:13px;line-height:1.65;outline:none;color:#222}
.rich-edit:empty::before{content:attr(data-ph);color:#bbb;pointer-events:none}

/* ── 서식바 ── */
.fmt-bar{display:flex;align-items:center;gap:2px;padding:4px 6px;border-bottom:1px solid #eee;background:#fafafa;flex-wrap:wrap}
.fmt-btn{width:28px;height:26px;border:none;background:transparent;border-radius:4px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:#555;display:flex;align-items:center;justify-content:center;transition:background .12s}
.fmt-btn:hover{background:#eee}
.fmt-sep{width:1px;height:16px;background:#ddd;margin:0 2px}
.fmt-color{width:22px;height:22px;border:2px solid #ccc;border-radius:50%;cursor:pointer;padding:0;background:transparent}
.fmt-color:hover{border-color:#888}
input[type=color]{position:absolute;visibility:hidden;width:0;height:0}

/* ── 칩 ── */
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{padding:5px 12px;border:1.5px solid #ccc;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;color:#555;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#888}
.chip.on{background:#111;color:#fff;border-color:#111}

/* ── 이모지 팔레트 ── */
.emoji-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.emoji-btn{width:32px;height:32px;border:1.5px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.emoji-btn:hover{border-color:#888;background:#f5f5f5}
.emoji-btn.on{border-color:#111;background:#111;filter:none}

/* ── 슬라이더 ── */
.slider-row{display:flex;align-items:center;gap:10px;margin-top:4px}
.slider-row input[type=range]{flex:1;accent-color:#111}
.slider-val{font-family:'Share Tech Mono',monospace;font-size:12px;color:#666;min-width:36px;text-align:right}

/* ── 복사 버튼 ── */
.copy-wrap{text-align:center;margin-top:18px}
#copy-btn{padding:10px 28px;background:#111;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .2s}
#copy-btn:hover{background:#333}
#copy-btn.copied{background:#2e7d32}

/* ── 반응형 ── */
@media(max-width:700px){
  .main{flex-direction:column}
  .form-panel{width:100%;height:52vh;border-right:none;border-bottom:1px solid #ddd}
  .preview-panel{padding:14px}
}
</style>
</head>
<body>

<!-- ════ 헤더 ════ -->
<div class="app-header">
  <div class="logo">NSSA</div>
  <div class="sep"></div>
  <div class="sub">About Creator 편집기</div>
</div>

<div class="main">
<!-- ════ 좌: 폼 ════ -->
<div class="form-panel">

  <!-- 크리에이터 -->
  <div class="sec">
    <div class="sec-title">크리에이터</div>
    <div class="field"><label>이모지 아바타</label>
      <div class="emoji-row">
        <button class="emoji-btn on" onclick="pickEmoji(this,'🖤')">🖤</button>
        <button class="emoji-btn"    onclick="pickEmoji(this,'⭐')">⭐</button>
        <button class="emoji-btn"    onclick="pickEmoji(this,'🔥')">🔥</button>
        <button class="emoji-btn"    onclick="pickEmoji(this,'💀')">💀</button>
        <button class="emoji-btn"    onclick="pickEmoji(this,'🐾')">🐾</button>
        <button class="emoji-btn"    onclick="pickEmoji(this,'👁️')">👁️</button>
        <button class="emoji-btn"    onclick="pickEmoji(this,'🩸')">🩸</button>
        <button class="emoji-btn"    onclick="pickEmoji(this,'✦')">✦</button>
      </div>
    </div>
    <div class="field"><label>아바타 이미지 URL (선택)</label><input type="text" id="avatar-url" placeholder="https://..." oninput="onAvatarUrl()"></div>
    <div class="field"><label>닉네임</label><input type="text" id="creator-name" placeholder="크리에이터 닉네임" oninput="render()"></div>
    <div class="field"><label>소속 / 부제</label><input type="text" id="creator-sub" placeholder="케이브덕 · NSSA 세계관" oninput="render()"></div>
    <div class="field"><label>한 줄 코멘트</label>
      <div class="rich-wrap">
        <div class="fmt-bar">
          <button class="fmt-btn" title="굵게" onmousedown="event.preventDefault()" onclick="fmtBold()"><b>B</b></button>
          <button class="fmt-btn" title="가늘게" onmousedown="event.preventDefault()" onclick="fmtThin()"><span style="font-weight:300">T</span></button>
          <button class="fmt-btn" title="기울임" onmousedown="event.preventDefault()" onclick="fmtItalic()"><i>I</i></button>
          <span class="fmt-sep"></span>
          <button class="fmt-color" style="background:#e74c3c" onmousedown="event.preventDefault()" onclick="fmtColor('#e74c3c')"></button>
          <button class="fmt-color" style="background:#3498db" onmousedown="event.preventDefault()" onclick="fmtColor('#3498db')"></button>
          <button class="fmt-color" style="background:#f39c12" onmousedown="event.preventDefault()" onclick="fmtColor('#f39c12')"></button>
          <button class="fmt-color" style="background:#2ecc71" onmousedown="event.preventDefault()" onclick="fmtColor('#2ecc71')"></button>
          <button class="fmt-color" style="background:#111111" onmousedown="event.preventDefault()" onclick="fmtColor('#111111')"></button>
          <label class="fmt-btn" title="커스텀 색상" style="position:relative;cursor:pointer;">🎨<input type="color" id="custom-color-1" onchange="fmtColor(this.value)"></label>
        </div>
        <div class="rich-edit" id="creator-comment" contenteditable="true" data-ph="한 줄 코멘트를 입력하세요." onkeyup="saveCurrentRange();render()" onmouseup="saveCurrentRange()" ontouchend="saveCurrentRange()"></div>
      </div>
    </div>
  </div>

  <!-- 세계관 -->
  <div class="sec">
    <div class="sec-title">세계관</div>
    <div class="field"><label>세계관 이름</label><input type="text" id="world-title" placeholder="특안청" oninput="render()"></div>
    <div class="field"><label>영문 약칭</label><input type="text" id="world-subtitle" placeholder="NSSA" oninput="render()"></div>
    <div class="field"><label>세계관 설명</label>
      <div class="rich-wrap">
        <div class="fmt-bar">
          <button class="fmt-btn" title="굵게" onmousedown="event.preventDefault()" onclick="fmtBold()"><b>B</b></button>
          <button class="fmt-btn" title="가늘게" onmousedown="event.preventDefault()" onclick="fmtThin()"><span style="font-weight:300">T</span></button>
          <button class="fmt-btn" title="기울임" onmousedown="event.preventDefault()" onclick="fmtItalic()"><i>I</i></button>
          <span class="fmt-sep"></span>
          <button class="fmt-color" style="background:#e74c3c" onmousedown="event.preventDefault()" onclick="fmtColor('#e74c3c')"></button>
          <button class="fmt-color" style="background:#3498db" onmousedown="event.preventDefault()" onclick="fmtColor('#3498db')"></button>
          <button class="fmt-color" style="background:#f39c12" onmousedown="event.preventDefault()" onclick="fmtColor('#f39c12')"></button>
          <button class="fmt-color" style="background:#2ecc71" onmousedown="event.preventDefault()" onclick="fmtColor('#2ecc71')"></button>
          <button class="fmt-color" style="background:#111111" onmousedown="event.preventDefault()" onclick="fmtColor('#111111')"></button>
          <label class="fmt-btn" title="커스텀 색상" style="position:relative;cursor:pointer;">🎨<input type="color" id="custom-color-2" onchange="fmtColor(this.value)"></label>
        </div>
        <div class="rich-edit" id="world-desc" contenteditable="true" data-ph="세계관 설명을 입력하세요." onkeyup="saveCurrentRange();render()" onmouseup="saveCurrentRange()" ontouchend="saveCurrentRange()"></div>
      </div>
    </div>
    <div class="field"><label>관련 링크 (선택)</label><input type="text" id="world-link" placeholder="https://..." oninput="render()"></div>
  </div>

  <!-- 캐릭터 -->
  <div class="sec">
    <div class="sec-title">뉴 캐릭터</div>
    <div class="field"><label>캐릭터 이름</label><input type="text" id="char-name" placeholder="캐릭터 이름" oninput="render()"></div>
    <div class="field"><label>타입</label>
      <div class="chip-group">
        <span class="chip on" onclick="selectType(this,'sigma-combat')">시그마 · 전투</span>
        <span class="chip"    onclick="selectType(this,'sigma-support')">시그마 · 지원</span>
        <span class="chip"    onclick="selectType(this,'delta')">델타</span>
      </div>
    </div>
    <div class="field"><label>직급</label><input type="text" id="char-rank" placeholder="2급 특수요원" oninput="render()"></div>
    <div class="field"><label>부서</label><input type="text" id="char-dept" placeholder="특수전략과" oninput="render()"></div>
    <div class="field"><label>캐릭터 이미지 URL (선택)</label><input type="text" id="char-img" placeholder="https://..." oninput="onCharImg()"></div>
    <div class="field"><label>배경 블러</label>
      <div class="slider-row">
        <input type="range" id="blur-range" min="0" max="30" value="12" oninput="onBlurChange()">
        <span class="slider-val" id="blur-val">12px</span>
      </div>
    </div>
    <div class="field"><label>배경 어둡기</label>
      <div class="slider-row">
        <input type="range" id="dim-range" min="20" max="95" value="65" oninput="onDimChange()">
        <span class="slider-val" id="dim-val">65%</span>
      </div>
    </div>
  </div>

  <div class="copy-wrap"><button id="copy-btn" onclick="copyHTML()">HTML 복사하기</button></div>
</div>

<!-- ════ 우: 미리보기 ════ -->
<div class="preview-panel">
  <div class="preview-inner">
    <div id="preview-root"></div>
  </div>
</div>
</div>

<!-- ════ 스크립트 ════ -->
<script>
/* ── 상태 ── */
const state = {
  avatarEmoji: '🖤',
  avatarUrl: '',
  charType: 'sigma-combat',
  charImg: '',
  blurPx: 12,
  dimPct: 65
};

/* ── 이모지 선택 ── */
function pickEmoji(el, emoji){
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  state.avatarEmoji = emoji;
  render();
}

/* ── URL 입력 ── */
function onAvatarUrl(){
  state.avatarUrl = document.getElementById('avatar-url').value.trim();
  render();
}
function onCharImg(){
  state.charImg = document.getElementById('char-img').value.trim();
  render();
}

/* ── 슬라이더 ── */
function onBlurChange(){
  const v = document.getElementById('blur-range').value;
  state.blurPx = parseInt(v);
  document.getElementById('blur-val').textContent = v + 'px';
  render();
}
function onDimChange(){
  const v = document.getElementById('dim-range').value;
  state.dimPct = parseInt(v);
  document.getElementById('dim-val').textContent = v + '%';
  render();
}

/* ── 타입 칩 ── */
function selectType(el, val){
  document.querySelectorAll('.chip-group .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  state.charType = val;
  render();
}

/* ── 리치에딧: 선택 영역 저장/복원 ── */
let savedRange = null;
let savedRichEl = null;

function saveCurrentRange(){
  const sel = window.getSelection();
  if(sel.rangeCount > 0){
    const r = sel.getRangeAt(0);
    const rich = r.startContainer.nodeType === 1
      ? r.startContainer.closest('.rich-edit')
      : r.startContainer.parentElement?.closest('.rich-edit');
    if(rich){
      savedRange = r.cloneRange();
      savedRichEl = rich;
    }
  }
}

function restoreSel(){
  if(!savedRange || !savedRichEl) return false;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
  return true;
}

/* ── 빈 태그 정리 ── */
function cleanEmptyNodes(root){
  root.querySelectorAll('b,i,span').forEach(el=>{
    if(el.innerHTML.trim() === '' || el.innerHTML === '<br>') el.remove();
  });
}

/* ── 색상 스팬 벗기기 ── */
function stripColorSpans(frag){
  frag.querySelectorAll('span[style*="color"]').forEach(sp=>{
    while(sp.firstChild) sp.parentNode.insertBefore(sp.firstChild, sp);
    sp.remove();
  });
}

/* ── 서식 적용 ── */
function applyWrap(tag, styleProp, styleVal){
  if(!restoreSel()) return;
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const range = sel.getRangeAt(0);

  /* 이미 같은 태그 안이면 해제 */
  let parent = range.startContainer;
  if(parent.nodeType === 3) parent = parent.parentElement;
  const existing = parent.closest(tag + '[style*="'+styleProp+'"]');
  if(existing && existing !== savedRichEl){
    while(existing.firstChild) existing.parentNode.insertBefore(existing.firstChild, existing);
    existing.remove();
    cleanEmptyNodes(savedRichEl);
    render();
    return;
  }

  const contents = range.extractContents();
  const wrapper = document.createElement(tag);
  wrapper.style[styleProp] = styleVal;
  wrapper.appendChild(contents);
  if(wrapper.innerHTML.trim() === '' || wrapper.innerHTML === '<br>'){
    range.insertNode(document.createTextNode(''));
  } else {
    range.insertNode(wrapper);
  }
  cleanEmptyNodes(savedRichEl);
  render();
}

function fmtBold(){ applyWrap('b','fontWeight','bold'); }
function fmtThin(){ applyWrap('span','fontWeight','300'); }
function fmtItalic(){ applyWrap('i','fontStyle','italic'); }

function fmtColor(hex){
  if(!restoreSel()) return;
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const contents = range.extractContents();
  const frag = document.createElement('div');
  frag.appendChild(contents);
  stripColorSpans(frag);
  const wrapper = document.createElement('span');
  wrapper.style.color = hex;
  while(frag.firstChild) wrapper.appendChild(frag.firstChild);
  if(wrapper.innerHTML.trim() === '' || wrapper.innerHTML === '<br>'){
    range.insertNode(document.createTextNode(''));
  } else {
    range.insertNode(wrapper);
  }
  cleanEmptyNodes(savedRichEl);
  render();
}

/* ── 이스케이프 ── */
function esc(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s){
  return esc(s);
}

/* ── 리치에딧 → HTML 텍스트 ── */
function domToHTML(node){
  if(node.nodeType === 3) return esc(node.textContent);
  if(node.nodeType !== 1) return '';
  const tag = node.tagName.toLowerCase();
  if(tag === 'br') return '<br>';
  let inner = '';
  node.childNodes.forEach(c=>{ inner += domToHTML(c); });
  /* 빈 span 제거 */
  if((tag === 'span' || tag === 'b' || tag === 'i') && (inner.trim() === '' || inner.trim() === '<br>')) return inner;
  const style = node.getAttribute('style');
  if(style) return '<'+tag+' style="'+esc(style)+'">'+inner+'</'+tag+'>';
  return '<'+tag+'>'+inner+'</'+tag+'>';
}

/* ── 리치에딧 값 가져오기 ── */
function r(id){
  const el = document.getElementById(id);
  if(!el) return '';
  let html = '';
  el.childNodes.forEach(c=>{ html += domToHTML(c); });
  return html || '';
}

/* ── 일반 입력 값 ── */
function gv(id){
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

/* ── 렌더 ── */
function render(){
  const name    = gv('creator-name')    || '크리에이터 닉네임';
  const sub     = gv('creator-sub')     || '케이브덕 · NSSA 세계관';
  const comment = r('creator-comment')  || '한 줄 코멘트를 입력하세요.';
  const wTitle  = gv('world-title')     || '특안청';
  const wSub    = gv('world-subtitle')  || 'NSSA';
  const wDesc   = r('world-desc')       || '세계관 설명을 입력하세요.';
  const wLink   = gv('world-link')      || '';
  const cName   = gv('char-name')       || '캐릭터 이름';
  const cRank   = gv('char-rank')       || '직급';
  const cDept   = gv('char-dept')       || '부서';

  /* 아바타 */
  const avatarHTML = state.avatarUrl
    ? '<img src="'+escAttr(state.avatarUrl)+'" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">'
    : '<span style="font-size:20px;">'+state.avatarEmoji+'</span>';

  /* 타입 */
  let typeLabel = 'SIGMA · COMBAT', typeColor = 'rgb(200,50,50)';
  if(state.charType === 'sigma-support'){ typeLabel = 'SIGMA · SUPPORT'; typeColor = 'rgb(200,50,50)'; }
  else if(state.charType === 'delta'){ typeLabel = 'DELTA'; typeColor = '#aaa'; }

  /* 링크 */
  const safeLink = (wLink && /^https?:\/\//.test(wLink))
    ? '<a href="'+escAttr(wLink)+'" style="font-size:11px;color:#5b9bd5;word-break:break-all;" target="_blank" rel="noopener">'+esc(wLink)+'</a>'
    : '';

  /* 캐릭터 배경 */
  const blurVal = state.blurPx || 0;
  const dimVal  = (state.dimPct != null ? state.dimPct : 65) / 100;

  const charBgImg = state.charImg
    ? '<img src="'+escAttr(state.charImg)+'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;">'
    : '';

  const overlayStyle = state.charImg
    ? 'position:absolute;inset:0;backdrop-filter:blur('+blurVal+'px);-webkit-backdrop-filter:blur('+blurVal+'px);background:rgba(0,0,0,'+dimVal+');'
    : 'position:absolute;inset:0;background:rgba(0,0,0,'+dimVal+');';

  /* 도장 — 정적 glow, 비율 반응형 */
  const stamp = ''
    +'<div style="width:35%;max-width:150px;min-width:90px;flex-shrink:0;filter:drop-shadow(0 0 10px rgba(200,50,50,.3));">'
    +  '<div style="width:100%;height:0;padding-bottom:100%;position:relative;">'
    +    '<div style="position:absolute;inset:0;border-radius:50%;border:4px solid rgb(180,30,30);display:flex;align-items:center;justify-content:center;flex-direction:column;">'
    +      '<div style="position:absolute;inset:6%;border-radius:50%;border:1.5px solid rgba(180,30,30,.5);"></div>'
    +      '<div style="position:absolute;top:14%;left:50%;transform:translateX(-50%);font-family:monospace;font-size:clamp(5px,2vw,9px);font-weight:700;letter-spacing:.35em;color:rgb(180,30,30);text-transform:uppercase;white-space:nowrap;">CLASSIFIED</div>'
    +      '<div style="position:absolute;top:25%;left:50%;transform:translateX(-50%);display:flex;gap:4px;">'
    +        '<span style="font-size:clamp(4px,1.5vw,7px);color:rgb(180,30,30);">★</span>'
    +        '<span style="font-size:clamp(4px,1.5vw,7px);color:rgb(180,30,30);">★</span>'
    +        '<span style="font-size:clamp(4px,1.5vw,7px);color:rgb(180,30,30);">★</span>'
    +      '</div>'
    +      '<div style="position:absolute;top:50%;left:50%;width:110%;transform:translate(-50%,-50%) rotate(-8deg);background:rgb(180,30,30);padding:5% 0;display:flex;align-items:center;justify-content:center;border-top:2px solid rgba(120,20,20,.6);border-bottom:2px solid rgba(120,20,20,.6);">'
    +        '<span style="font-family:monospace;font-size:clamp(8px,3.5vw,17px);font-weight:700;letter-spacing:.12em;color:#fff;text-transform:uppercase;white-space:nowrap;">COMING SOON</span>'
    +      '</div>'
    +      '<div style="position:absolute;bottom:25%;left:50%;transform:translateX(-50%);display:flex;gap:4px;">'
    +        '<span style="font-size:clamp(4px,1.5vw,7px);color:rgb(180,30,30);">★</span>'
    +        '<span style="font-size:clamp(4px,1.5vw,7px);color:rgb(180,30,30);">★</span>'
    +        '<span style="font-size:clamp(4px,1.5vw,7px);color:rgb(180,30,30);">★</span>'
    +      '</div>'
    +      '<div style="position:absolute;bottom:14%;left:50%;transform:translateX(-50%);font-family:monospace;font-size:clamp(5px,1.8vw,8px);font-weight:700;letter-spacing:.3em;color:rgb(180,30,30);text-transform:uppercase;white-space:nowrap;">NSSA · 2026</div>'
    +    '</div>'
    +  '</div>'
    +'</div>';

  /* 인적사항 — flex:1 반응형 */
  const personnel = ''
    +'<div style="flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:6px;">'
    +  '<div style="font-family:monospace;font-size:clamp(6px,2vw,9px);letter-spacing:.3em;color:rgba(255,255,255,.4);text-transform:uppercase;">PERSONNEL FILE</div>'
    +  '<div style="font-family:monospace;font-size:clamp(14px,5vw,24px);font-weight:700;letter-spacing:.08em;color:#fff;text-transform:uppercase;word-break:break-word;">'+esc(cName)+'</div>'
    +  '<div style="font-family:monospace;font-size:clamp(7px,2.2vw,11px);font-weight:700;letter-spacing:.2em;color:'+typeColor+';text-transform:uppercase;">'+esc(typeLabel)+'</div>'
    +  '<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 12px;">'
    +    '<div><span style="font-family:monospace;font-size:clamp(5px,1.6vw,7px);letter-spacing:.15em;color:rgba(255,255,255,.35);text-transform:uppercase;">RANK</span><br><span style="font-family:monospace;font-size:clamp(8px,2.5vw,12px);color:rgba(255,255,255,.85);letter-spacing:.04em;">'+esc(cRank)+'</span></div>'
    +    '<div><span style="font-family:monospace;font-size:clamp(5px,1.6vw,7px);letter-spacing:.15em;color:rgba(255,255,255,.35);text-transform:uppercase;">DEPT</span><br><span style="font-family:monospace;font-size:clamp(8px,2.5vw,12px);color:rgba(255,255,255,.85);letter-spacing:.04em;">'+esc(cDept)+'</span></div>'
    +  '</div>'
    +  '<div style="margin-top:6px;font-family:monospace;font-size:clamp(5px,1.5vw,7px);letter-spacing:.2em;color:rgba(255,255,255,.2);text-transform:uppercase;">NSSA-'+(state.charType==='delta'?'D':'S')+'-0000</div>'
    +'</div>';

  /* ===== 전체 HTML 조립 ===== */
  document.getElementById('preview-root').innerHTML = ''
    +'<div style="display:flex;flex-direction:column;gap:10px;padding:16px;background:#f2f2f0;border-radius:12px;font-family:\'Noto Sans KR\',sans-serif;">'

    /* ★ 크리에이터 + 세계관: flex-wrap으로 가로↔세로 자동 전환 */
    +'<div style="display:flex;flex-wrap:wrap;gap:10px;">'

      /* 크리에이터 카드 */
      +'<div style="flex:1 1 220px;min-width:220px;border-radius:10px;overflow:hidden;background:#fff;border:1px solid #eee;display:flex;flex-direction:column;">'
      +  '<div style="padding:14px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0;">'
      +    '<div style="width:38px;height:38px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;">'+avatarHTML+'</div>'
      +    '<div>'
      +      '<div style="font-size:14px;font-weight:700;color:#111;">'+esc(name)+'</div>'
      +      '<div style="font-size:10px;color:#999;margin-top:1px;">'+esc(sub)+'</div>'
      +    '</div>'
      +  '</div>'
      +  '<div style="padding:12px 16px;font-size:12.5px;color:#444;line-height:1.7;flex:1;">'+comment+'</div>'
      +'</div>'

      /* 세계관 카드 */
      +'<div style="flex:1 1 220px;min-width:220px;border-radius:10px;overflow:hidden;background:#fff;border:1px solid #eee;display:flex;flex-direction:column;">'
      +  '<div style="padding:14px 16px 10px;border-bottom:1px solid #f0f0f0;">'
      +    '<div style="font-family:monospace;font-size:15px;font-weight:700;color:#111;letter-spacing:.04em;text-transform:uppercase;">'+esc(wTitle)+'</div>'
      +    '<div style="font-size:10px;color:#aaa;font-family:monospace;letter-spacing:.04em;margin-top:2px;">'+esc(wSub)+'</div>'
      +  '</div>'
      +  '<div style="padding:12px 16px;font-size:12px;color:#555;line-height:1.7;flex:1;">'+wDesc+'</div>'
      +  (safeLink ? '<div style="padding:8px 16px 12px;">'+safeLink+'</div>' : '')
      +'</div>'

    +'</div>' /* flex-wrap 컨테이너 끝 */

    /* 구분선 */
    +'<div style="text-align:center;padding:6px 0;"><span style="font-family:monospace;font-size:9px;letter-spacing:.4em;color:#bbb;">──────────</span></div>'

    /* ★ 캐릭터 카드 — height:0 + padding-bottom:56.25% = 16:9 */
    +'<div style="border-radius:10px;overflow:hidden;border:1px solid #ddd;background:#fff;">'
    +  '<div style="padding:.65rem 1rem .55rem;border-bottom:1px solid #eee;">'
    +    '<div style="font-family:monospace;font-size:15px;font-weight:700;color:#111;letter-spacing:.05em;text-transform:uppercase;">New Character</div>'
    +    '<div style="font-size:9px;color:#aaa;font-family:monospace;letter-spacing:.04em;margin-top:2px;">// classified</div>'
    +  '</div>'
    +  '<div style="position:relative;width:100%;height:0;padding-bottom:56.25%;overflow:hidden;background:#1a1a1a;">'
    +    charBgImg
    +    '<div style="'+overlayStyle+'"></div>'
    +    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:clamp(10px,4vw,28px);padding:clamp(8px,3vw,20px);z-index:2;">'
    +      stamp
    +      personnel
    +    '</div>'
    +    '<div style="position:absolute;top:8px;left:10px;font-family:monospace;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.15);text-transform:uppercase;z-index:1;">RESTRICTED</div>'
    +    '<div style="position:absolute;bottom:8px;right:10px;font-family:monospace;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.15);text-transform:uppercase;z-index:1;">NSSA-DOC-2026</div>'
    +  '</div>'
    +  '<div style="padding:.45rem 1rem;border-top:1px solid #eee;"><div style="font-size:9px;color:#bbb;font-family:monospace;letter-spacing:.04em;text-align:center;">// 업데이트 예정</div></div>'
    +'</div>'

    +'</div>'; /* 최외곽 끝 */
}

/* ── HTML 복사 (preview innerHTML 그대로) ── */
function copyHTML(){
  const inner = document.getElementById('preview-root').innerHTML;
  navigator.clipboard.writeText(inner).then(function(){
    var btn = document.getElementById('copy-btn');
    btn.textContent = '복사 완료!';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = 'HTML 복사하기'; btn.classList.remove('copied'); }, 2200);
  });
}

/* ── 초기 렌더 ── */
render();
</script>
