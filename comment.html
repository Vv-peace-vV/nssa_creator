<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSSA · About Creator 편집기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f0f0;color:#222;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app-header{background:#111;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3em;letter-spacing:3px;color:#fff}
.app-subtitle{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.38);margin-left:10px}
.app-badge{font-family:'Share Tech Mono',monospace;font-size:9px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);padding:3px 8px;border-radius:4px}
.main{display:flex;flex:1;overflow:hidden}
.form-panel{width:330px;flex-shrink:0;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden}
.form-panel-header{padding:11px 16px;border-bottom:1px solid #eee;background:#fafafa;flex-shrink:0}
.form-panel-header h2{font-size:13px;font-weight:700;color:#111}
.form-panel-header p{font-size:11px;color:#999;margin-top:2px}
.form-scroll-area{flex:1;overflow-y:auto}
.form-body{padding:11px 14px;display:flex;flex-direction:column;gap:9px}
.fmt-bar{display:flex;align-items:center;gap:5px;padding:7px 14px;background:#1a1a1a;border-bottom:1px solid #333;flex-shrink:0;flex-wrap:wrap;position:sticky;top:0;z-index:20}
.fmt-bar-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.28);margin-right:2px;flex-shrink:0}
.fmt-btn{width:26px;height:26px;border-radius:5px;border:1px solid rgba(255,255,255,.14);background:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:'Noto Sans KR',sans-serif;flex-shrink:0}
.fmt-btn:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.28)}
.fmt-divider{width:1px;height:18px;background:rgba(255,255,255,.11);margin:0 2px;flex-shrink:0}
.fmt-swatch{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.fmt-swatch:hover{transform:scale(1.22);border-color:rgba(255,255,255,.5)}
.fmt-swatch.dark{border-color:rgba(255,255,255,.24)}
input[type=color].fmt-custom{width:17px;height:17px;border-radius:50%;border:2px solid rgba(255,255,255,.2);cursor:pointer;padding:0;background:none;flex-shrink:0}
.fmt-hint{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(255,255,255,.18);width:100%;margin-top:1px}
.section-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:#bbb;padding:5px 0 2px;border-bottom:1px solid #f0f0f0;margin-top:4px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:500;color:#666;letter-spacing:.3px}
.field input,.field select{font-size:12px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:6px;background:#fafafa;color:#222;width:100%;transition:border .15s;font-family:'Noto Sans KR',sans-serif}
.field input:focus,.field select:focus{outline:none;border-color:#999;background:#fff}
.rich-edit{font-size:12px;padding:7px 10px;border:1px solid #e0e0e0;border-radius:6px;background:#fafafa;color:#222;width:100%;transition:border .15s;font-family:'Noto Sans KR',sans-serif;min-height:52px;outline:none;line-height:1.7;word-break:break-word;overflow-wrap:break-word}
.rich-edit:focus{border-color:#999;background:#fff}
.rich-edit:empty::before{content:attr(data-placeholder);color:#bbb;pointer-events:none}
.rich-edit.tall{min-height:80px}
.avatar-upload-wrap{display:flex;align-items:center;gap:10px}
.avatar-preview-circle{width:52px;height:52px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0}
.avatar-preview-circle img{width:100%;height:100%;object-fit:cover}
.avatar-btns{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.avatar-url-input{font-size:11px;padding:5px 8px;border:1px solid #e0e0e0;border-radius:5px;background:#fafafa;color:#222;width:100%;font-family:'Noto Sans KR',sans-serif;outline:none}
.avatar-url-input:focus{border-color:#999}
.avatar-emoji-row{display:flex;gap:4px;flex-wrap:wrap}
.emoji-btn{width:26px;height:26px;border-radius:5px;border:1px solid #e0e0e0;background:#fafafa;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.emoji-btn:hover{background:#efefef;border-color:#ccc}
.emoji-btn.selected{border-color:#111;background:#f0f0f0;box-shadow:0 0 0 1px #111}
.img-input-group{border:1px solid #e0e0e0;border-radius:6px;background:#fafafa;overflow:hidden}
.img-preview-thumb{width:100%;aspect-ratio:3/1.4;background:#e5e5e5;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.img-preview-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-preview-thumb .no-img{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:#bbb}
.img-url-input{width:100%;border:none;border-top:1px solid #e0e0e0;padding:6px 10px;font-size:11px;background:#fff;color:#222;font-family:'Noto Sans KR',sans-serif;outline:none}
.img-url-input::placeholder{color:#ccc}
.chip-selector{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0}
.chip-option{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.5px;padding:4px 9px;border:1px solid #ddd;border-radius:4px;cursor:pointer;color:#888;background:#fafafa;transition:all .15s;user-select:none}
.chip-option:hover{border-color:#999;color:#444}
.chip-option.selected{background:#111;color:#fff;border-color:#111}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row input[type=range]{flex:1;accent-color:#111}
.slider-val{font-family:'Share Tech Mono',monospace;font-size:11px;color:#666;min-width:38px;text-align:right}
.copy-btn{margin:10px 14px 14px;padding:10px;background:#111;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;font-family:'Share Tech Mono',monospace;transition:background .2s;flex-shrink:0}
.copy-btn:hover{background:#333}
.copy-btn.copied{background:#1a6b3a}
.preview-panel{flex:1;overflow-y:auto;padding:24px;background:#e8e8e8;display:flex;justify-content:center}
.preview-inner{width:100%;max-width:460px}
.preview-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:#999;text-align:center;margin-bottom:12px}
@media(max-width:700px){
  .main{flex-direction:column}
  .form-panel{width:100%;height:52vh;border-right:none;border-bottom:1px solid #ddd}
  .preview-panel{padding:14px}
}
</style>
</head>
<body>

<div class="app-header">
  <div style="display:flex;align-items:center">
    <div class="app-logo">NSSA</div>
    <div class="app-subtitle">ABOUT CREATOR EDITOR</div>
  </div>
  <div class="app-badge">케이브덕 호환 · 인라인 스타일</div>
</div>

<div class="main">

  <div class="form-panel">
    <div class="form-panel-header">
      <h2>About Creator 편집기</h2>
      <p>입력하면 오른쪽 미리보기가 실시간으로 바뀌어요</p>
    </div>

    <div class="form-scroll-area">
      <div class="fmt-bar">
        <span class="fmt-bar-label">FORMAT</span>
        <button class="fmt-btn" onmousedown="event.preventDefault()" onclick="fmtBold()" title="굵게"><b>B</b></button>
        <button class="fmt-btn" onmousedown="event.preventDefault()" onclick="fmtThin()" title="얇게"><span style="font-weight:300;font-size:12px">T</span></button>
        <button class="fmt-btn" onmousedown="event.preventDefault()" onclick="fmtItalic()" title="기울기"><span style="font-style:italic;font-weight:400">I</span></button>
        <div class="fmt-divider"></div>
        <span class="fmt-swatch dark" style="background:#111" onmousedown="event.preventDefault()" onclick="fmtColor('#111111')"></span>
        <span class="fmt-swatch" style="background:#fff;border:1px solid #ccc" onmousedown="event.preventDefault()" onclick="fmtColor('#ffffff')"></span>
        <span class="fmt-swatch" style="background:#ff6b6b" onmousedown="event.preventDefault()" onclick="fmtColor('#ff6b6b')"></span>
        <span class="fmt-swatch" style="background:#ffa94d" onmousedown="event.preventDefault()" onclick="fmtColor('#ffa94d')"></span>
        <span class="fmt-swatch" style="background:#ffe066" onmousedown="event.preventDefault()" onclick="fmtColor('#ffe066')"></span>
        <span class="fmt-swatch" style="background:#69db7c" onmousedown="event.preventDefault()" onclick="fmtColor('#69db7c')"></span>
        <span class="fmt-swatch" style="background:#74c0fc" onmousedown="event.preventDefault()" onclick="fmtColor('#74c0fc')"></span>
        <span class="fmt-swatch" style="background:#cc99ff" onmousedown="event.preventDefault()" onclick="fmtColor('#cc99ff')"></span>
        <span class="fmt-swatch" style="background:#f783ac" onmousedown="event.preventDefault()" onclick="fmtColor('#f783ac')"></span>
        <span class="fmt-swatch" style="background:#aaa" onmousedown="event.preventDefault()" onclick="fmtColor('#aaaaaa')"></span>
        <div class="fmt-divider"></div>
        <input type="color" class="fmt-custom" id="color-picker" value="#111111" title="직접 선택" onchange="fmtColor(this.value)">
        <div class="fmt-hint">텍스트 드래그 후 버튼 클릭 · B/I는 토글</div>
      </div>

      <div class="form-body">

        <!-- ① 크리에이터 -->
        <div class="section-label">CREATOR PROFILE</div>

        <div class="field">
          <label>프사 (이모지 또는 이미지 URL)</label>
          <div class="avatar-upload-wrap">
            <div class="avatar-preview-circle" id="avatar-preview-circle">
              <span id="avatar-emoji-display">🖤</span>
            </div>
            <div class="avatar-btns">
              <input class="avatar-url-input" id="avatar-url" placeholder="이미지 URL (비워두면 이모지)" oninput="onAvatarUrl()">
              <div class="avatar-emoji-row">
                <button class="emoji-btn selected" onclick="pickEmoji(this,'🖤')">🖤</button>
                <button class="emoji-btn" onclick="pickEmoji(this,'🤍')">🤍</button>
                <button class="emoji-btn" onclick="pickEmoji(this,'🐺')">🐺</button>
                <button class="emoji-btn" onclick="pickEmoji(this,'🐈‍⬛')">🐈‍⬛</button>
                <button class="emoji-btn" onclick="pickEmoji(this,'⚡')">⚡</button>
                <button class="emoji-btn" onclick="pickEmoji(this,'🌙')">🌙</button>
                <button class="emoji-btn" onclick="pickEmoji(this,'🔫')">🔫</button>
                <button class="emoji-btn" onclick="pickEmoji(this,'🗡️')">🗡️</button>
              </div>
            </div>
          </div>
        </div>

        <div class="field">
          <label>크리에이터 닉네임</label>
          <input id="creator-name" placeholder="닉네임" oninput="render()" value="">
        </div>

        <div class="field">
          <label>하단 작은 글</label>
          <input id="creator-sub" placeholder="케이브덕 · NSSA 세계관" oninput="render()" value="케이브덕 · NSSA 세계관">
        </div>

        <div class="field">
          <label>크리에이터 한마디</label>
          <div class="rich-edit tall" contenteditable="true" id="creator-comment" data-placeholder="안녕하세요 🖤"></div>
        </div>

        <!-- ② 세계관 -->
        <div class="section-label">WORLDVIEW</div>

        <div class="field">
          <label>기관명 (제목)</label>
          <input id="world-title" placeholder="특안청" oninput="render()" value="특안청">
        </div>

        <div class="field">
          <label>부제 (영문 소자막)</label>
          <input id="world-subtitle" placeholder="NSSA · NATIONAL SPECIAL SECURITY AGENCY · 2026" oninput="render()" value="NSSA · NATIONAL SPECIAL SECURITY AGENCY · 2026">
        </div>

        <div class="field">
          <label>세계관 설명 텍스트</label>
          <div class="rich-edit" contenteditable="true" id="world-desc" data-placeholder="신인류 출현 이후 25년..."></div>
        </div>

        <div class="field">
          <label>설정집 링크 URL</label>
          <input id="world-link" placeholder="https://..." oninput="render()" value="">
        </div>

        <!-- ③ 뉴 캐릭터 -->
        <div class="section-label">NEW CHARACTER</div>

        <div class="field">
          <label>캐릭터 이름</label>
          <input id="char-name" placeholder="캐릭터 이름" oninput="render()" value="">
        </div>

        <div class="field">
          <label>타입</label>
          <div class="chip-selector">
            <div class="chip-option selected" onclick="selectChip('charType','sigma-combat',this)">시그마 · 전투</div>
            <div class="chip-option" onclick="selectChip('charType','sigma-support',this)">시그마 · 지원</div>
            <div class="chip-option" onclick="selectChip('charType','delta',this)">델타</div>
          </div>
        </div>

        <div class="field">
          <label>직급</label>
          <input id="char-rank" placeholder="2급 특수요원" oninput="render()" value="">
        </div>

        <div class="field">
          <label>부서</label>
          <input id="char-dept" placeholder="특수전략과" oninput="render()" value="">
        </div>

        <div class="field">
          <label>캐릭터 이미지 URL (선택)</label>
          <div class="img-input-group">
            <div class="img-preview-thumb" id="thumb-char">
              <span class="no-img">NO IMAGE</span>
            </div>
            <input class="img-url-input" id="char-img" placeholder="이미지 URL (비워두면 어두운 배경)" oninput="onCharImg()">
          </div>
        </div>

        <!-- ★ 이미지 위치 조정 (이미지 넣으면 나타남) -->
        <div class="field" id="img-adjust-char" style="display:none">
          <label>이미지 위치 조정</label>
          <div style="display:flex;flex-direction:column;gap:6px;border:1px solid #e0e0e0;border-radius:6px;background:#fafafa;padding:10px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:11px;color:#999;width:28px;">↕</span>
              <input type="range" id="char-pos-y" min="-50" max="50" value="0" oninput="updateCharImg()" style="flex:1;accent-color:#111">
              <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#bbb;width:30px;text-align:right;" id="char-pos-y-val">0%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:11px;color:#999;width:28px;">↔</span>
              <input type="range" id="char-pos-x" min="-50" max="50" value="0" oninput="updateCharImg()" style="flex:1;accent-color:#111">
              <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#bbb;width:30px;text-align:right;" id="char-pos-x-val">0%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:11px;color:#999;width:28px;">🔍</span>
              <input type="range" id="char-scale" min="100" max="300" value="100" oninput="updateCharImg()" style="flex:1;accent-color:#111">
              <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#bbb;width:30px;text-align:right;" id="char-scale-val">100%</span>
            </div>
            <button onclick="resetCharImg()" style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#999;background:none;border:1px solid #e0e0e0;border-radius:4px;padding:3px 8px;cursor:pointer;align-self:flex-end;">위치 초기화</button>
          </div>
        </div>

        <div class="field">
          <label>배경 블러</label>
          <div class="slider-row">
            <input type="range" id="blur-range" min="0" max="30" value="12" oninput="onBlurChange()">
            <span class="slider-val" id="blur-val">12px</span>
          </div>
        </div>

        <div class="field">
          <label>배경 어둡기</label>
          <div class="slider-row">
            <input type="range" id="dim-range" min="20" max="95" value="65" oninput="onDimChange()">
            <span class="slider-val" id="dim-val">65%</span>
          </div>
        </div>

      </div>
    </div>

    <button class="copy-btn" id="copy-btn" onclick="copyHTML()">HTML 복사하기</button>
  </div>

  <!-- 미리보기 -->
  <div class="preview-panel">
    <div class="preview-inner">
      <div class="preview-label">PREVIEW · 실시간 미리보기</div>
      <div id="preview-root"></div>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   상태
═══════════════════════════════════════ */
var state = {
  avatarEmoji: '🖤',
  avatarUrl: '',
  charType: 'sigma-combat',
  charImg: '',
  blurPx: 12,
  dimPct: 65,
  imgPos: { x: 0, y: 0, s: 100 }
};

/* ═══════════════════════════════════════
   아바타
═══════════════════════════════════════ */
function pickEmoji(el, emoji) {
  state.avatarEmoji = emoji; state.avatarUrl = '';
  document.getElementById('avatar-url').value = '';
  document.getElementById('avatar-emoji-display').textContent = emoji;
  var c = document.getElementById('avatar-preview-circle');
  var img = c.querySelector('img'); if (img) img.remove();
  document.getElementById('avatar-emoji-display').style.display = '';
  document.querySelectorAll('.emoji-btn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected'); render();
}
function onAvatarUrl() {
  var url = document.getElementById('avatar-url').value.trim();
  state.avatarUrl = url;
  var c = document.getElementById('avatar-preview-circle');
  var img = c.querySelector('img');
  var sp = document.getElementById('avatar-emoji-display');
  if (url) {
    if (!img) { img = document.createElement('img'); img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%'; c.appendChild(img); }
    img.src = url; sp.style.display = 'none';
    document.querySelectorAll('.emoji-btn').forEach(function(b) { b.classList.remove('selected'); });
  } else { if (img) img.remove(); sp.style.display = ''; }
  render();
}

/* ═══════════════════════════════════════
   캐릭터 이미지
═══════════════════════════════════════ */
function onCharImg() {
  var url = document.getElementById('char-img').value.trim();
  state.charImg = url;
  var thumb = document.getElementById('thumb-char');
  var img = thumb.querySelector('img');
  var noImg = thumb.querySelector('.no-img');
  var adjust = document.getElementById('img-adjust-char');
  if (url) {
    if (!img) { img = document.createElement('img'); thumb.appendChild(img); }
    img.src = url; if (noImg) noImg.style.display = 'none';
    if (adjust) adjust.style.display = '';
  } else {
    if (img) img.remove(); if (noImg) noImg.style.display = '';
    if (adjust) adjust.style.display = 'none';
    state.imgPos = { x: 0, y: 0, s: 100 };
  }
  render();
}

/* ═══════════════════════════════════════
   이미지 위치 조정
═══════════════════════════════════════ */
function updateCharImg() {
  var x = parseInt(document.getElementById('char-pos-x').value);
  var y = parseInt(document.getElementById('char-pos-y').value);
  var s = parseInt(document.getElementById('char-scale').value);
  state.imgPos = { x: x, y: y, s: s };
  document.getElementById('char-pos-x-val').textContent = x + '%';
  document.getElementById('char-pos-y-val').textContent = y + '%';
  document.getElementById('char-scale-val').textContent = s + '%';
  render();
}
function resetCharImg() {
  document.getElementById('char-pos-x').value = 0;
  document.getElementById('char-pos-y').value = 0;
  document.getElementById('char-scale').value = 100;
  updateCharImg();
}
function getCharImgStyle() {
  var d = state.imgPos;
  return 'position:absolute;left:50%;top:50%;width:' + d.s + '%;height:' + d.s + '%;min-width:100%;min-height:100%;object-fit:cover;transform:translate(calc(-50% + ' + d.x + '%), calc(-50% + ' + d.y + '%));display:block;';
}

/* ═══════════════════════════════════════
   슬라이더
═══════════════════════════════════════ */
function onBlurChange() {
  var v = document.getElementById('blur-range').value;
  state.blurPx = parseInt(v);
  document.getElementById('blur-val').textContent = v + 'px';
  render();
}
function onDimChange() {
  var v = document.getElementById('dim-range').value;
  state.dimPct = parseInt(v);
  document.getElementById('dim-val').textContent = v + '%';
  render();
}

/* ═══════════════════════════════════════
   칩
═══════════════════════════════════════ */
function selectChip(key, val, el) {
  state[key] = val;
  el.parentNode.querySelectorAll('.chip-option').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected'); render();
}

/* ═══════════════════════════════════════
   리치에딧
═══════════════════════════════════════ */
var savedRange = null, lastRich = null;

document.querySelectorAll('.rich-edit').forEach(function(el) {
  el.addEventListener('focus', function() { lastRich = el; });
  el.addEventListener('input', render);
  el.addEventListener('mouseup', function() {
    var sel = window.getSelection();
    if (sel && sel.rangeCount > 0) { savedRange = sel.getRangeAt(0).cloneRange(); lastRich = el; }
  });
  el.addEventListener('keyup', function() {
    var sel = window.getSelection();
    if (sel && sel.rangeCount > 0) { savedRange = sel.getRangeAt(0).cloneRange(); lastRich = el; }
  });
  el.addEventListener('paste', function(e) {
    e.preventDefault(); document.execCommand('insertText', false, e.clipboardData.getData('text/plain'));
  });
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); document.execCommand('insertHTML', false, '<br>'); }
  });
});

document.querySelector('.fmt-bar').addEventListener('mousedown', function(e) {
  var sel = window.getSelection();
  if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
  e.preventDefault();
});
document.querySelector('.fmt-bar').addEventListener('touchstart', function(e) {
  var sel = window.getSelection();
  if (sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
  e.preventDefault();
}, { passive: false });

function restoreSel() {
  if (!savedRange) return false;
  var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
  return !sel.isCollapsed;
}

function cleanEmptyNodes(root) {
  if (!root) return;
  root.querySelectorAll('b,i,span,strong,em').forEach(function(el) {
    var txt = el.textContent.trim();
    var html = el.innerHTML.trim();
    if (txt === '' && (html === '' || html === '<br>')) {
      while (el.firstChild) el.parentNode.insertBefore(el.firstChild, el);
      el.remove();
    }
  });
}

function stripColorSpans(container) {
  container.querySelectorAll('span').forEach(function(sp) {
    if (sp.style.color) {
      while (sp.firstChild) sp.parentNode.insertBefore(sp.firstChild, sp);
      sp.remove();
    }
  });
}

function hasAnc(node, fn) {
  var c = node.parentNode;
  while (c) { if (c.nodeType === 1 && fn(c)) return true; c = c.parentNode; }
  return false;
}
function isAllWrapped(range, fn) {
  var frag = range.cloneContents(); var texts = [];
  function col(n) { if (n.nodeType === 3 && n.textContent.length > 0) texts.push(fn(n)); n.childNodes.forEach(col); }
  col(frag); return texts.length > 0 && texts.every(Boolean);
}
function applyWrap(tagName, styleProp, styleVal) {
  if (!restoreSel()) return;
  var sel = window.getSelection(); var range = sel.getRangeAt(0);
  var anc = range.commonAncestorContainer; if (anc.nodeType === 3) anc = anc.parentNode;
  var richEl = anc.closest('.rich-edit'); if (!richEl) return;
  var already = isAllWrapped(range, function(node) {
    return hasAnc(node, function(el) {
      if (tagName === 'b') return el.tagName === 'B' || el.tagName === 'STRONG';
      if (tagName === 'i') return el.tagName === 'I' || el.tagName === 'EM';
      if (tagName === 'span' && styleProp === 'fontWeight') return el.tagName === 'SPAN' && el.style.fontWeight === styleVal;
      return false;
    });
  });
  var frag = range.extractContents();
  if (already) {
    function unwrap(node) {
      var df = document.createDocumentFragment();
      node.childNodes.forEach(function(child) {
        if (child.nodeType === 3) { df.appendChild(child.cloneNode()); }
        else if (child.nodeType === 1) {
          var t = child.tagName; var rm = false;
          if (tagName === 'b' && (t === 'B' || t === 'STRONG')) rm = true;
          if (tagName === 'i' && (t === 'I' || t === 'EM')) rm = true;
          if (tagName === 'span' && t === 'SPAN' && styleProp === 'fontWeight' && child.style.fontWeight === styleVal) rm = true;
          if (rm) df.appendChild(unwrap(child));
          else { var cl = child.cloneNode(false); cl.appendChild(unwrap(child)); df.appendChild(cl); }
        }
      }); return df;
    }
    range.insertNode(unwrap(frag));
  } else {
    var w = document.createElement(tagName);
    if (styleProp) w.style[styleProp] = styleVal;
    w.appendChild(frag);
    if (w.textContent.trim() === '') { while (w.firstChild) range.insertNode(w.firstChild); }
    else range.insertNode(w);
  }
  cleanEmptyNodes(richEl); render();
}
function fmtBold() { applyWrap('b', null, null); }
function fmtThin() { applyWrap('span', 'fontWeight', '300'); }
function fmtItalic() { applyWrap('i', null, null); }
function fmtColor(hex) {
  if (!restoreSel()) return;
  var sel = window.getSelection(); var range = sel.getRangeAt(0);
  var anc = range.commonAncestorContainer; if (anc.nodeType === 3) anc = anc.parentNode;
  var richEl = anc.closest('.rich-edit'); if (!richEl) return;
  var contents = range.extractContents();
  var tempDiv = document.createElement('div'); tempDiv.appendChild(contents);
  stripColorSpans(tempDiv);
  var sp = document.createElement('span'); sp.style.color = hex;
  while (tempDiv.firstChild) sp.appendChild(tempDiv.firstChild);
  if (sp.textContent.trim() === '') { while (sp.firstChild) range.insertNode(sp.firstChild); }
  else range.insertNode(sp);
  cleanEmptyNodes(richEl); render();
}

/* ═══════════════════════════════════════
   이스케이프
═══════════════════════════════════════ */
function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }
function escAttr(s) { return esc(s); }

/* ═══════════════════════════════════════
   DOM → 인라인 HTML
═══════════════════════════════════════ */
function domToHTML(node) {
  var out = '';
  node.childNodes.forEach(function(child) {
    if (child.nodeType === 3) { out += esc(child.textContent); }
    else if (child.nodeType === 1) {
      var tag = child.tagName.toLowerCase();
      if (tag === 'div' || tag === 'p') { var inner = domToHTML(child); if (inner.trim()) out += inner + '<br>'; return; }
      if (tag === 'br') { out += '<br>'; return; }
      var inner2 = domToHTML(child);
      if (!inner2.trim()) return;
      if (tag === 'b' || tag === 'strong') out += '<b>' + inner2 + '</b>';
      else if (tag === 'i' || tag === 'em') out += '<i>' + inner2 + '</i>';
      else if (tag === 'span') {
        var fw = child.style.fontWeight, col = child.style.color; var s = '';
        if (fw && fw !== '400' && fw !== 'normal') s += 'font-weight:' + fw + ';';
        if (col) s += 'color:' + col + ';';
        var nb = inner2.replace(/<br\s*\/?>/gi, '').trim();
        if (!nb) { out += inner2; return; }
        out += s ? '<span style="' + s + '">' + inner2 + '</span>' : inner2;
      } else out += inner2;
    }
  }); return out;
}
function r(id) {
  var el = document.getElementById(id); if (!el) return '';
  if (el.hasAttribute('contenteditable')) { var h = domToHTML(el); return h.replace(/(<br\s*\/?>)+$/gi, ''); }
  return esc(el.value);
}
function gv(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

function copyHTML() {
  var inner = document.getElementById('preview-root').innerHTML;
  navigator.clipboard.writeText(inner).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = '복사 완료!'; btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'HTML 복사하기'; btn.classList.remove('copied'); }, 2200);
  });
}
